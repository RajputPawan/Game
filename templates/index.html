<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-Toe</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f0f0f0; }
        table { margin: 50px auto; border-collapse: collapse; }
        td { width: 100px; height: 100px; border: 2px solid #333; font-size: 2em; cursor: pointer; background: white; }
        td:hover { background: #eee; }
        #status { font-size: 1.5em; margin: 20px; }
        button { padding: 10px 20px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <table id="board">
        <tr><td data-pos="0"></td><td data-pos="1"></td><td data-pos="2"></td></tr>
        <tr><td data-pos="3"></td><td data-pos="4"></td><td data-pos="5"></td></tr>
        <tr><td data-pos="6"></td><td data-pos="7"></td><td data-pos="8"></td></tr>
    </table>
    <div id="status">Player X's turn</div>
    <button onclick="reset()">New Game</button>

    <script>
        let board = Array(9).fill('');
        let current = 'X';
        function updateBoard() {
            document.querySelectorAll('td').forEach((cell, i) => cell.textContent = board[i]);
            document.getElementById('status').textContent = `Player ${current}'s turn`;
        }
        document.querySelectorAll('td').forEach(cell => {
            cell.onclick = () => {
                fetch(`/move/${cell.dataset.pos}`).then(r => r.json()).then(data => {
                    board = data.board;
                    current = data.current;
                    document.getElementById('status').textContent = data.message;
                    updateBoard();
                });
            };
        });
        function reset() {
            fetch('/reset').then(r => r.json()).then(data => {
                board = data.board;
                current = data.current;
                updateBoard();
            });
        }
        updateBoard();
    </script>
</body>
</html>
